# DMTCDRK — Debian 12 / Docker Compose
#
# Старт:     ./start.sh
# Проверка:  docker compose run --rm verify
# Один прогон: docker compose run --rm run
# Фон:       docker compose up -d daemon
#
# Контейнеры запускаются от владельца каталога (DOCKER_UID/GID), чтобы не было
# Permission denied при записи .input_hash, domain_cache.json и т.д.

services:
  verify:
    build: .
    image: dmtcdrk:latest
    profiles: [verify]
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=verify_input.txt
      - OUTPUT_FILE=output_verify.txt
      - HASH_FILE=.verify_hash
      - LOG_LEVEL=DEBUG
      - FORCE_RUN=1
      - USE_DOMAIN_CACHE=0
      - CONCURRENCY_LIMIT=1
      - DELAY=1.0
    command: ["bash", "verify_inner.sh"]

  run:
    build: .
    image: dmtcdrk:latest
    profiles: [run]
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=${INPUT_FILE:-input.txt}
      - OUTPUT_FILE=${OUTPUT_FILE:-output_optimized.txt}
      - HASH_FILE=${HASH_FILE:-.input_hash}
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-1}
      - DELAY=${DELAY:-1.0}
      - GIT_USER_NAME=${GIT_USER_NAME:-DMTCDRK}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dmtcdrk@localhost}
    command: ["bash", "run.sh"]

  daemon:
    build: .
    image: dmtcdrk:latest
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=${INPUT_FILE:-input.txt}
      - OUTPUT_FILE=${OUTPUT_FILE:-output_optimized.txt}
      - HASH_FILE=${HASH_FILE:-.input_hash}
      - USE_DOMAIN_CACHE=${USE_DOMAIN_CACHE:-1}
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-1}
      - DELAY=${DELAY:-1.0}
      - GIT_USER_NAME=${GIT_USER_NAME:-DMTCDRK}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dmtcdrk@localhost}
    command: ["bash", "scheduler.sh"]
    restart: unless-stopped
