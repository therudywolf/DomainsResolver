# DMTCDRK — Debian 12 / Docker Compose
#
# Старт:     ./start.sh
# Проверка:  docker compose run --rm verify
# Один прогон: docker compose run --rm run
# Фон:       docker compose up -d daemon
# WG проверка: ./verify_wg.sh

services:
  wireguard:
    build:
      context: .
      dockerfile: Dockerfile.wg
    image: dmtcdrk-wg:latest
    env_file: .env
    environment:
      - WG_CONF=${WG_CONF:-forestserver_DE-DE-578.conf}
    volumes:
      - ./wg:/etc/wireguard:ro
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    command: ["sh", "-c", "wg-quick up \"/etc/wireguard/${WG_CONF:-forestserver_DE-DE-578.conf}\" && exec sleep infinity"]

  verify_wg:
    image: alpine:latest
    network_mode: service:wireguard
    depends_on:
      - wireguard
    profiles: [verify_wg]
    command: ["sh", "-c", "echo '[1/3] DNS через WG...' && getent hosts example.com || exit 1 && echo '[2/3] Внешний IP через WG...' && wget -qO- --timeout=10 https://ifconfig.me 2>/dev/null || exit 1 && echo '' && echo '[3/3] OK'"]

  verify:
    build: .
    image: dmtcdrk:latest
    profiles: [verify]
    network_mode: service:wireguard
    depends_on:
      - wireguard
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=verify_input.txt
      - OUTPUT_FILE=output_verify.txt
      - HASH_FILE=.verify_hash
      - LOG_LEVEL=DEBUG
      - FORCE_RUN=1
      - USE_DOMAIN_CACHE=0
      - CONCURRENCY_LIMIT=1
      - DELAY=1.0
      - USE_WG_DNS=1
    command: ["bash", "verify_inner.sh"]

  run:
    build: .
    image: dmtcdrk:latest
    profiles: [run]
    network_mode: service:wireguard
    depends_on:
      - wireguard
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=${INPUT_FILE:-input.txt}
      - OUTPUT_FILE=${OUTPUT_FILE:-output_optimized.txt}
      - HASH_FILE=${HASH_FILE:-.input_hash}
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-1}
      - DELAY=${DELAY:-1.0}
      - GIT_USER_NAME=${GIT_USER_NAME:-DMTCDRK}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dmtcdrk@localhost}
      - USE_WG_DNS=1
    command: ["bash", "run.sh"]

  daemon:
    build: .
    image: dmtcdrk:latest
    network_mode: service:wireguard
    depends_on:
      - wireguard
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=${INPUT_FILE:-input.txt}
      - OUTPUT_FILE=${OUTPUT_FILE:-output_optimized.txt}
      - HASH_FILE=${HASH_FILE:-.input_hash}
      - USE_DOMAIN_CACHE=${USE_DOMAIN_CACHE:-1}
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-1}
      - DELAY=${DELAY:-1.0}
      - GIT_USER_NAME=${GIT_USER_NAME:-DMTCDRK}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-dmtcdrk@localhost}
      - USE_WG_DNS=1
    command: ["bash", "scheduler.sh"]
    restart: unless-stopped
