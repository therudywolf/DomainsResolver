# DMTCDRK — Debian 12 / Docker Compose
#
# Старт:     ./start.sh
# Проверка:  docker compose run --rm verify
# Один прогон: docker compose run --rm run
# Фон:       docker compose up -d daemon

services:
  verify:
    build: .
    image: dmtcdrk:latest
    profiles: [verify]
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=verify_input.txt
      - OUTPUT_FILE=output_verify.txt
      - HASH_FILE=.verify_hash
      - LOG_LEVEL=DEBUG
      - FORCE_RUN=1
      - USE_DOMAIN_CACHE=0
    command: ["./verify_inner.sh"]

  run:
    build: .
    image: dmtcdrk:latest
    profiles: [run]
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=${INPUT_FILE:-input.txt}
      - OUTPUT_FILE=${OUTPUT_FILE:-output_optimized.txt}
      - HASH_FILE=${HASH_FILE:-.input_hash}
    command: ["./run.sh"]

  daemon:
    build: .
    image: dmtcdrk:latest
    volumes:
      - .:/data
    working_dir: /data
    env_file: .env
    environment:
      - INPUT_FILE=${INPUT_FILE:-input.txt}
      - OUTPUT_FILE=${OUTPUT_FILE:-output_optimized.txt}
      - HASH_FILE=${HASH_FILE:-.input_hash}
      - USE_DOMAIN_CACHE=${USE_DOMAIN_CACHE:-1}
    command: ["./scheduler.sh"]
    restart: unless-stopped
